<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trinity — Philosophical Tribunal</title>
<meta name="description" content="Three minds across millennia. One verdict. Ask a yes/no question and let history's greatest thinkers deliberate.">
<meta name="theme-color" content="#050505">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--card:#0f0f0f;--card2:#0d0d0d;--border:#1d1d1d;--text:#ffffffcc;--faint:#ffffff40;--dimmer:#ffffff1a;--gold:#E8D5A3;--violet:#C084FC;--mint:#6EE7B7;--yes:#4ADE80;--no:#F87171}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
.mono{font-family:'Courier New',monospace}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
textarea,input{font-family:inherit;background:none;border:none;color:var(--text);outline:none;resize:none}

/* Header */
.header{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 6px 18px}
.header-left{display:flex;flex-direction:column;gap:4px}
.header-tag{font-size:9px;font-weight:700;letter-spacing:3.5px;color:var(--faint);font-family:'Courier New',monospace}
.header-title{font-size:28px;font-weight:900;background:linear-gradient(90deg,#fff,#ffffffb3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:11px;font-style:italic;color:var(--faint);margin-top:1px}
.settings-btn{width:36px;height:36px;border-radius:50%;background:#ffffff0d;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:16px;color:var(--faint)}
.settings-btn:hover{background:#ffffff15}

/* Scroll content */
.content{flex:1;overflow-y:auto;padding-bottom:40px;-webkit-overflow-scrolling:touch}

/* Triangle SVG */
.triangle-wrap{width:100%;max-width:320px;margin:0 auto 12px;display:block}

/* Question card */
.question-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:17px 17px 11px}
.question-label{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--faint);font-family:'Courier New',monospace;margin-bottom:8px}
.question-input{width:100%;font-size:15px;color:#ffffffe6;line-height:1.5;min-height:24px;max-height:120px}
.question-input::placeholder{color:#ffffff30;font-style:italic}
.question-divider{height:1px;background:#191919;margin:12px 0 8px}
.question-footer{display:flex;align-items:center;justify-content:space-between}
.char-count{font-size:8px;letter-spacing:1px;color:var(--dimmer);font-family:'Courier New',monospace}
.convene-btn{font-size:9px;font-weight:800;letter-spacing:2px;font-family:'Courier New',monospace;padding:10px 20px;border-radius:10px;transition:all 0.3s}
.convene-btn.active{background:linear-gradient(135deg,var(--violet),#818CF8);color:#000;box-shadow:0 0 16px #C084FC29}
.convene-btn.inactive{background:#161616;color:var(--dimmer)}

/* Breathing quote */
.breathing-quote{text-align:center;padding:8px 0;animation:breathe 4.5s ease-in-out infinite}
.breathing-quote p{font-size:11px;font-style:italic;color:#ffffff4d}
.breathing-quote .attr{font-size:8px;letter-spacing:1.5px;color:#ffffff38;font-family:'Courier New',monospace;margin-top:2px}
@keyframes breathe{0%,100%{opacity:.28}50%{opacity:.6}}

/* Loading text */
.loading-text{font-size:11px;font-style:italic;color:var(--faint);line-height:1.6;padding:0 4px 18px;animation:breathe 2.2s ease-in-out infinite}

/* Thinking text */
.thinking-row{text-align:center;min-height:13px;font-size:9px;font-family:'Courier New',monospace;letter-spacing:0.07em;margin:5px 0 0;transition:color 0.2s}

/* Verdict cards */
.verdict-cards{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.verdict-card{background:var(--card2);border-radius:12px;padding:12px 14px;border-left:2px solid;animation:fadeSlideUp 0.4s ease both}
.vc-header{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.vc-sigil{font-size:13px;opacity:0.9}
.vc-name{font-size:11px;font-weight:700;color:#ffffffcc}
.vc-vote{margin-left:auto;font-size:12px;font-weight:900}
.vc-verdict{font-size:11px;color:#ffffffaa;font-style:italic;line-height:1.55;margin-bottom:7px}
.vc-explanation{font-size:10px;color:#ffffff55;line-height:1.5;padding-top:5px}

/* Verdict panel */
.verdict-panel{background:#080808;border-radius:20px;padding:26px 20px;text-align:center;position:relative;overflow:hidden;animation:fadeSlideUp 0.5s cubic-bezier(0.16,1,0.3,1) both}
.vp-header{font-size:8px;letter-spacing:0.4em;color:#ffffff22;font-family:'Courier New',monospace;font-weight:700;margin-bottom:14px}
.vp-verdict{font-size:64px;font-weight:900;letter-spacing:-0.03em;line-height:1;margin-bottom:14px;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both}
.vp-counts{display:flex;justify-content:center;gap:22px;margin-bottom:16px}
.vp-count-num{font-size:22px;font-weight:900}
.vp-count-label{font-size:8px;color:#ffffff28;letter-spacing:0.2em;font-family:'Courier New',monospace}
.vp-summary{font-size:11px;color:#ffffff2e;font-style:italic;line-height:1.65;margin-bottom:20px;padding:0 6px}
.ask-again-btn{width:100%;padding:13px;border-radius:11px;border:1px solid #ffffff2e;font-size:9px;font-weight:700;letter-spacing:2px;color:#ffffff73;font-family:'Courier New',monospace;transition:all 0.2s}
.ask-again-btn:hover{background:#ffffff0a;border-color:#ffffff40}

/* History */
.history-section{margin-top:16px}
.history-label{font-size:8px;font-weight:700;letter-spacing:2.5px;color:#ffffff4d;font-family:'Courier New',monospace;margin-bottom:8px}
.history-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#090909;border:1px solid #131313;border-radius:10px;margin-bottom:6px}
.history-icon{font-size:12px;font-weight:900;min-width:18px;text-align:center}
.history-q{font-size:11px;font-style:italic;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Settings overlay */
.settings-overlay{position:fixed;inset:0;background:#000000cc;z-index:100;display:none;justify-content:center;align-items:flex-end}
.settings-overlay.open{display:flex}
.settings-sheet{background:#0a0a0a;width:100%;max-width:430px;max-height:90vh;border-radius:20px 20px 0 0;overflow-y:auto;padding:20px 20px 40px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.settings-title{font-size:16px;font-weight:700;color:#ffffffcc}
.settings-done{font-size:12px;font-family:'Courier New',monospace;color:#ffffff99}
.section-card{background:#0f0f0f;border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px}
.section-label{font-size:8px;font-weight:700;letter-spacing:2.5px;color:var(--faint);font-family:'Courier New',monospace;margin-bottom:10px}
.section-desc{font-size:11px;font-style:italic;color:var(--faint);line-height:1.55;margin-bottom:10px}
.existence-input{width:100%;min-height:80px;font-size:13px;line-height:1.55;color:#ffffffd9;padding:12px;background:#080808;border:1px solid var(--border);border-radius:12px}
.existence-input::placeholder{color:#ffffff33;font-style:italic}
.char-indicator{text-align:right;font-size:8px;font-family:'Courier New',monospace;color:var(--dimmer);margin-top:4px}
.judge-model-group{background:#080808;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.judge-model-header{display:flex;align-items:center;gap:6px;padding:10px 14px 4px}
.judge-model-header .sigil{font-size:12px}
.judge-model-header .name{font-size:12px;font-weight:700;color:#ffffffb3}
.model-option{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;transition:background 0.15s}
.model-option:hover{background:#ffffff08}
.model-option .label{font-size:11px;color:#ffffffa6}
.model-option .check{font-size:10px;font-weight:700}
.model-divider{height:1px;background:var(--border);margin:0 14px}
.lang-option{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;transition:background 0.15s}
.lang-option:hover{background:#ffffff08}
.lang-option .native{font-size:13px;color:#ffffffcc}
.lang-option .english{font-size:10px;font-family:'Courier New',monospace;color:var(--dimmer)}
.lang-option .check{margin-left:auto;font-size:12px;font-weight:700;color:var(--mint)}
.lang-divider{height:1px;background:var(--border);margin:0 14px}
.lang-list{background:#080808;border:1px solid var(--border);border-radius:12px;overflow:hidden}

/* Animations */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(0.4) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes nervousDot{0%,100%{transform:translateY(0);opacity:0.2}50%{transform:translateY(-3px);opacity:1}}

/* Hide scrollbar */
.content::-webkit-scrollbar{display:none}
.content{-ms-overflow-style:none;scrollbar-width:none}
</style>
</head>

const T={x:150,y:16},L={x:16,y:264},R={x:284,y:264},C={x:150,y:181};
const mTL={x:(T.x+L.x)/2,y:(T.y+L.y)/2},mTR={x:(T.x+R.x)/2,y:(T.y+R.y)/2},mLR={x:(L.x+R.x)/2,y:(L.y+R.y)/2};
const WEDGE_PATHS=[
  `${T.x},${T.y} ${mTR.x},${mTR.y} ${C.x},${C.y} ${mTL.x},${mTL.y}`,
  `${L.x},${L.y} ${mTL.x},${mTL.y} ${C.x},${C.y} ${mLR.x},${mLR.y}`,
  `${R.x},${R.y} ${mLR.x},${mLR.y} ${C.x},${C.y} ${mTR.x},${mTR.y}`,
];
const LABEL_POS=[{x:150,y:105},{x:100,y:212},{x:200,y:212}];

// ========== TRIANGLE SVG ==========
function triangleSVG(){
  const js = judges();
  const s = state.judgeStates;
  const r = state.results;
  let svg = `<svg viewBox="0 0 300 285" class="triangle-wrap" style="overflow:visible">`;
  svg += `<defs>`;
  js.forEach((j,i)=>{
    const op = s[i]==="done"?0.22:s[i]==="thinking"?0.14:0.03;
    svg += `<radialGradient id="g${i}" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="${j.color}" stop-opacity="${op}"/><stop offset="100%" stop-color="${j.color}" stop-opacity="0"/></radialGradient>`;
  });
  svg += `</defs>`;
  // Wedge fills
  js.forEach((_,i)=>{ svg += `<polygon points="${WEDGE_PATHS[i]}" fill="url(#g${i})"/>`; });
  // Outer stroke
  svg += `<polygon points="${T.x},${T.y} ${R.x},${R.y} ${L.x},${L.y}" fill="none" stroke="#ffffff0c" stroke-width="1"/>`;
  // Dividers
  const anyDone=s.includes("done"), anyThink=s.includes("thinking");
  const dc = anyDone?"#ffffff18":anyThink?"#ffffff0d":"#ffffff07";
  [{p:mTL},{p:mTR},{p:mLR}].forEach(m=>{
    svg += `<line x1="${C.x}" y1="${C.y}" x2="${m.p.x}" y2="${m.p.y}" stroke="${dc}" stroke-width="0.8" stroke-dasharray="3 4"/>`;
  });
  // Active wedge edges
  js.forEach((j,i)=>{
    if(s[i]!=="idle"){
      const so = s[i]==="done"?0.55:0.35;
      svg += `<polygon points="${WEDGE_PATHS[i]}" fill="none" stroke="${j.color}" stroke-width="${s[i]==="done"?1.2:0.8}" stroke-opacity="${so}"/>`;
    }
  });
  // Centroid
  svg += `<circle cx="${C.x}" cy="${C.y}" r="4" fill="#050505" stroke="#ffffff12" stroke-width="1"/>`;
  svg += `<circle cx="${C.x}" cy="${C.y}" r="1.5" fill="#ffffff22"/>`;
  // Labels
  js.forEach((j,i)=>{
    const lp=LABEL_POS[i], si=s[i], isDone=si==="done", isThink=si==="thinking";
    svg += `<text x="${lp.x}" y="${lp.y-14}" text-anchor="middle" dominant-baseline="middle" font-size="${isDone?18:isThink?15:14}" fill="${j.color}" opacity="${isDone?1:isThink?0.55:0.18}" style="font-family:Georgia,serif;${isDone?`filter:drop-shadow(0 0 6px ${j.color})`:''}">${j.sigil}</text>`;
    svg += `<text x="${lp.x}" y="${lp.y+6}" text-anchor="middle" font-size="11" font-family="Georgia,serif" font-weight="700" fill="${isDone?'#ffffffee':isThink?'#ffffff77':'#ffffff22'}">${j.name}</text>`;
    svg += `<text x="${lp.x}" y="${lp.y+19}" text-anchor="middle" font-size="7.5" font-family="'Courier New',monospace" letter-spacing="1" fill="#ffffff28">${j.school}</text>`;
    if(isDone && r[i]){
      const vc = r[i].vote==="YES"?"#4ADE80":"#F87171";
      svg += `<circle cx="${lp.x}" cy="${lp.y+34}" r="10" fill="${vc}" style="filter:drop-shadow(0 0 8px ${vc});animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both"/>`;
      svg += `<text x="${lp.x}" y="${lp.y+34}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="900" font-family="Georgia,serif" fill="#000">${r[i].vote==="YES"?"✓":"✗"}</text>`;
    }
    if(isThink){
      [0,1,2].forEach(d=>{
        svg += `<circle cx="${lp.x-6+d*6}" cy="${lp.y+34}" r="1.8" fill="${j.color}" opacity="0.7" style="animation:nervousDot 0.72s ease-in-out ${d*0.13}s infinite"/>`;
      });
    }
  });
  svg += `</svg>`;
  return svg;
}

// ========== RENDER ==========
function render(){
  const js = judges();
  // Header
  document.getElementById("headerTag").textContent = t("philosophical_tribunal");
  document.getElementById("headerTitle").textContent = t("trinity");
  document.getElementById("headerSub").textContent = t("subtitle");

  const content = document.getElementById("content");
  let html = "";

  if(state.phase==="input"){
    html += triangleSVG();
    html += `<div class="question-card">
      <div class="question-label">${t("your_question")}</div>
      <textarea class="question-input" id="questionInput" placeholder="${t("placeholder")}" rows="2">${state.question}</textarea>
      <div class="question-divider"></div>
      <div class="question-footer">
        <span class="char-count">${state.question.trim()?state.question.length+" "+t("chars"):t("enter_to_submit")}</span>
        <button class="convene-btn ${state.question.trim()?"active":"inactive"}" onclick="convene()">${t("convene")}</button>
      </div>
    </div>`;
    // breathing quote removed
    if(state.history.length){
      html += `<div class="history-section"><div class="history-label">${t("past_verdicts")}</div>`;
      state.history.slice(0,10).forEach(h=>{
        const icon = h.verdict==="YES"?"✓":h.verdict==="NO"?"✗":"—";
        const ic = h.verdict==="YES"?"var(--yes)":h.verdict==="NO"?"var(--no)":"#ffffff55";
        html += `<div class="history-item"><span class="history-icon" style="color:${ic}">${icon}</span><span class="history-q">${h.question}</span></div>`;
      });
      html += `</div>`;
    }
  } else if(state.phase==="deliberating"){
    html += `<div class="loading-text">${state.loadingText}</div>`;
    html += triangleSVG();
    // Thinking texts
    html += `<div style="margin-top:8px">`;
    js.forEach((j,i)=>{
      if(state.judgeStates[i]==="thinking"){
        const idx = Math.floor(Math.random()*j.thoughtStyle.length);
        html += `<div class="thinking-row" style="color:${j.color}55" id="think${i}">${j.thoughtStyle[idx]}</div>`;
      }
    });
    html += `</div>`;
    // Verdict cards for done judges
    const doneCards = js.filter((_,i)=>state.judgeStates[i]==="done"&&state.results[i]);
    if(doneCards.length){
      html += `<div class="verdict-cards">`;
      doneCards.forEach(j=>{
        const i = js.indexOf(j), r=state.results[i];
        const vc = r.vote==="YES"?"var(--yes)":"var(--no)";
        html += `<div class="verdict-card" style="border-color:${j.color}22;border-left-color:${j.color}66">
          <div class="vc-header"><span class="vc-sigil" style="color:${j.color}">${j.sigil}</span><span class="vc-name">${j.name}</span><span class="vc-vote" style="color:${vc};text-shadow:0 0 10px ${vc}">${r.vote}</span></div>
          <div class="vc-verdict">"${r.verdict}"</div>
          <div class="vc-explanation">${r.explanation}</div>
        </div>`;
      });
      html += `</div>`;
    }
  } else if(state.phase==="verdict"){
    html += triangleSVG();
    // All verdict cards
    html += `<div class="verdict-cards">`;
    js.forEach((j,i)=>{
      const r=state.results[i]; if(!r)return;
      const vc = r.vote==="YES"?"var(--yes)":"var(--no)";
      html += `<div class="verdict-card" style="border-color:${j.color}22;border-left-color:${j.color}66">
        <div class="vc-header"><span class="vc-sigil" style="color:${j.color}">${j.sigil}</span><span class="vc-name">${j.name}</span><span class="vc-vote" style="color:${vc};text-shadow:0 0 10px ${vc}">${r.vote}</span></div>
        <div class="vc-verdict">"${r.verdict}"</div>
        <div class="vc-explanation">${r.explanation}</div>
      </div>`;
    });
    html += `</div>`;
    // Verdict panel
    const yes=state.results.filter(r=>r?.vote==="YES").length;
    const no=state.results.filter(r=>r?.vote==="NO").length;
    const verdict = yes>no?"YES":no>yes?"NO":"DEADLOCK";
    const isDL = verdict==="DEADLOCK";
    const vc = isDL?"#ffffff55":verdict==="YES"?"#4ADE80":"#F87171";
    const vg = isDL?"transparent":verdict==="YES"?"#4ADE8033":"#F8717133";
    const summary = isDL?t("summary_deadlock"):verdict==="YES"?t("summary_yes"):t("summary_no");
    html += `<div class="verdict-panel" style="border:1px solid ${vc}22;box-shadow:0 0 55px ${vg};margin-top:18px">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,${vc}07 0%,transparent 55%);pointer-events:none"></div>
      <div class="vp-header">${t("the_trinity_has_spoken")}</div>
      <div class="vp-verdict" style="color:${vc};text-shadow:0 0 45px ${vg}">${verdict}</div>
      <div class="vp-counts">
        <div><div class="vp-count-num" style="color:var(--yes)">${yes}</div><div class="vp-count-label">FOR</div></div>
        <div><div class="vp-count-num" style="color:var(--no)">${no}</div><div class="vp-count-label">AGAINST</div></div>
      </div>
      <div class="vp-summary">${summary}</div>
      <button class="ask-again-btn" onclick="resetApp()">${t("ask_again")}</button>
    </div>`;
  }

  content.innerHTML = html;

  // Attach input listener
  const inp = document.getElementById("questionInput");
  if(inp){
    inp.addEventListener("input", e=>{ state.question=e.target.value; });
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();convene();} });
    inp.focus();
    inp.setSelectionRange(inp.value.length,inp.value.length);
  }
}

// ========== API ==========
async function consultPhilosopher(judge, question, model){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
  const existenceCtx = state.existence.trim() ? `\n\nIMPORTANT PERSONAL CONTEXT — You MUST factor this into your verdict. The person asking is: ${state.existence.trim()}\nTailor your judgment specifically to their situation, life stage, and circumstances. Reference their context directly in your verdict. A generic answer is unacceptable — make it deeply personal.` : "";
  const langName = AVAILABLE_LANGS.find(l=>l.code===state.lang)?.label||"English";
  const langInst = state.lang==="en"?"":(`\n\nIMPORTANT: You MUST respond entirely in ${langName}. All text in your JSON response (vote value YES/NO excluded) must be in ${langName}.`);
  const systemInstruction = `${judge.personality}${existenceCtx}\n\nYou are deliberating on a yes/no question. You MUST choose either YES or NO — do not hedge.\nThink deeply from your philosophical perspective before voting.\nCRITICAL: Do NOT default to YES. Many questions deserve a NO. Vote NO if the action contradicts your philosophical principles, involves cowardice, bad faith, herd mentality, or avoidance of truth. Be genuinely critical and contrarian when your philosophy demands it. A tribunal where everyone agrees is worthless.\nYour verdict must be a single powerful sentence unique to this specific question.\nYour explanation must be 2-3 sentences explaining WHY you voted the way you did, grounded in your philosophy.${langInst}\n\nRespond ONLY with valid JSON, no markdown, no code fences:\n{"vote": "YES or NO", "verdict": "One powerful sentence from your philosophical perspective about THIS specific question.", "explanation": "2-3 sentences explaining WHY you voted this way, grounded in your philosophical principles."}`;

  const resp = await fetch(url, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      system_instruction:{parts:[{text:systemInstruction}]},
      contents:[{role:"user",parts:[{text:`The question before the council: "${question}"\n\nDeliberate from your unique philosophical perspective and cast your vote.`}]}],
      generationConfig:{temperature:1.0,maxOutputTokens:300,responseMimeType:"application/json"}
    })
  });
  const data = await resp.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
  const cleaned = text.replace(/```json|```/g,"").trim();
  const parsed = JSON.parse(cleaned);
  const vote = (parsed.vote||"").toUpperCase().trim();
  return { vote: vote==="YES"||vote==="NO"?vote:"YES", verdict:parsed.verdict||"The question itself reveals the answer.", explanation:parsed.explanation||"I vote this way because the question, when examined deeply, reveals its own answer." };
}

// ========== CONVENE ==========
let thinkingIntervals = [];
let loadingInterval = null;

async function convene(){
  const q = state.question.trim();
  if(!q || state.phase==="deliberating") return;

  const js = judges();
  state.phase = "deliberating";
  state.results = [null,null,null];
  state.judgeStates = ["idle","idle","idle"];

  const texts = LOADING_TEXTS[state.lang]||LOADING_TEXTS.en;
  state.loadingText = texts[0];
  render();

  let ltIdx = 0;
  loadingInterval = setInterval(()=>{ ltIdx=(ltIdx+1)%texts.length; state.loadingText=texts[ltIdx]; const el=document.querySelector(".loading-text"); if(el)el.textContent=texts[ltIdx]; },2600);

  // Start thinking text flicker
  thinkingIntervals.forEach(clearInterval);
  thinkingIntervals = [];

  // Staggered calls
  for(let i=0;i<3;i++){
    await new Promise(r=>setTimeout(r,i===0?0:700));
    state.judgeStates[i] = "thinking";
    render();

    // Start thinking flicker for this judge
    const ti = setInterval(()=>{
      const el = document.getElementById(`think${i}`);
      if(!el) return;
      const idx = Math.floor(Math.random()*js[i].thoughtStyle.length);
      el.textContent = js[i].thoughtStyle[idx];
      if(Math.random()>0.5){ el.style.color=js[i].color; setTimeout(()=>{if(el)el.style.color=js[i].color+"55";},55+Math.random()*150); }
    }, 700+Math.random()*600);
    thinkingIntervals.push(ti);

    // Fire API call (don't await — let them overlap)
    (async(idx)=>{
      try{
        const result = await consultPhilosopher(js[idx], q, state.models[idx]);
        state.results[idx] = result;
      } catch(e){
        console.error(`[Trinity] Error for ${js[idx].name}:`,e);
        const fallbacks = [
          {vote:"YES",verdict:"The unexamined premise may hide the truest answer.",explanation:"I vote yes because the willingness to question is itself the beginning of wisdom. By engaging with this choice rather than avoiding it, you honor the examined life."},
          {vote:"NO",verdict:"This path demands defiance — dare to question it.",explanation:"I vote no because true strength lies in resisting what the crowd rushes toward. The will to power demands you forge your own path, not follow the obvious one."},
          {vote:"YES",verdict:"In the face of the absurd, choose what makes you alive.",explanation:"I vote yes because in a universe without inherent meaning, the only rebellion is to choose fully and passionately. This choice embraces life rather than retreating from it."},
        ];
        state.results[idx] = fallbacks[idx];
      }
      state.judgeStates[idx] = "done";
      render();

      // Check if all done
      if(state.judgeStates.every(s=>s==="done")){
        clearInterval(loadingInterval);
        thinkingIntervals.forEach(clearInterval);
        // Save history
        const yes=state.results.filter(r=>r?.vote==="YES").length;
        const no=state.results.filter(r=>r?.vote==="NO").length;
        const v = yes>no?"YES":no>yes?"NO":"DEADLOCK";
        state.history.unshift({question:q,verdict:v,time:Date.now()});
        if(state.history.length>10) state.history=state.history.slice(0,10);
        save();
        setTimeout(()=>{ state.phase="verdict"; render(); },350);
      }
    })(i);
  }
}

function resetApp(){
  state.phase = "input";
  state.question = t("should_i");
  state.judgeStates = ["idle","idle","idle"];
  state.results = [null,null,null];
  render();
}

// ========== SETTINGS ==========
function openSettings(){
  const sheet = document.getElementById("settingsSheet");
  const js = judges();
  let html = `<div class="settings-header"><span class="settings-title">${t("settings")}</span><button class="settings-done" onclick="closeSettings()">${t("done")}</button></div>`;

  // Existence
  html += `<div class="section-card">
    <div class="section-label">${t("existence")}</div>
    <div class="section-desc">${t("existence_desc")}</div>
    <textarea class="existence-input" id="existenceInput" placeholder="${t("existence_placeholder")}" maxlength="500">${state.existence}</textarea>
    <div class="char-indicator"><span id="existenceCount">${state.existence.length}</span> / 500</div>
  </div>`;

  // Models (per judge)
  html += `<div class="section-card"><div class="section-label">${t("models")}</div>`;
  js.forEach((j,ji)=>{
    html += `<div class="judge-model-group"><div class="judge-model-header"><span class="sigil" style="color:${j.color}">${j.sigil}</span><span class="name">${j.name}</span></div>`;
    AVAILABLE_MODELS.forEach((m,mi)=>{
      const checked = state.models[ji]===m.id;
      html += `<div class="model-option" onclick="setModel(${ji},'${m.id}')"><span class="label">${m.label}</span>${checked?`<span class="check" style="color:${j.color}">✓</span>`:""}</div>`;
      if(mi<AVAILABLE_MODELS.length-1) html += `<div class="model-divider"></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  // Languages
  html += `<div class="section-card"><div class="section-label">${t("languages")}</div><div class="lang-list">`;
  AVAILABLE_LANGS.forEach((l,i)=>{
    const checked = state.lang===l.code;
    html += `<div class="lang-option" onclick="setLang('${l.code}')"><span class="native">${l.native}</span>${l.native!==l.label?`<span class="english">${l.label}</span>`:""}<span>${checked?`<span class="check">✓</span>`:""}</span></div>`;
    if(i<AVAILABLE_LANGS.length-1) html += `<div class="lang-divider"></div>`;
  });
  html += `</div></div>`;

  sheet.innerHTML = html;
  document.getElementById("settingsOverlay").classList.add("open");

  // Existence input listener
  const ei = document.getElementById("existenceInput");
  if(ei){
    ei.addEventListener("input",e=>{
      state.existence = e.target.value;
      document.getElementById("existenceCount").textContent = e.target.value.length;
      save();
    });
  }
}

function closeSettings(){
  document.getElementById("settingsOverlay").classList.remove("open");
  render();
}

function setModel(judgeIdx, modelId){
  state.models[judgeIdx] = modelId;
  save();
  openSettings(); // re-render settings
}

function setLang(code){
  state.lang = code;
  state.question = t("should_i");
  save();
  openSettings(); // re-render settings
}

// ========== INIT ==========
render();
</script>

</html>
